services:
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DETECTOR_MODE: mock
      MAX_SPAN_METERS: 70
      DATABASE_URL: sqlite:///data/output/street_vision.db
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
